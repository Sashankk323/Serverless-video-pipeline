AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Video transcoding pipeline - Day 4: the Day 3 state machine now produces
  HLS renditions (not bare MP4s), writes a master playlist, and serves
  everything through a CloudFront distribution (Origin Access Control, no
  public bucket access) so a browser can stream adaptively via hls.js.

Globals:
  Function:
    # Runtime and Architectures are intentionally NOT set here: ProbeFunction
    # and TranscodeFunction are PackageType Image with an x86_64 image (to
    # match the static ffmpeg/ffprobe build), and SAM's Globals merge for
    # Architectures on Image functions errors out even when the function-level
    # value would otherwise override it. Each function sets both explicitly instead.
    Timeout: 10
    MemorySize: 128

Resources:
  # Dedicated bucket for raw (pre-transcode) uploads only. Keeping it separate
  # from the future HLS output bucket means the two lifecycle/CORS/event
  # policies never fight each other as the pipeline grows.
  RawVideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub video-pipeline-raw-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*'] # tighten to the real frontend origin once it has a fixed domain
            AllowedMethods: [PUT]
            AllowedHeaders: ['*']
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: ExpireUploadsAfter7Days
            Status: Enabled
            ExpirationInDays: 7 # raw uploads are transient inputs, not the product - keep this at $0
      # Day 3: replaces the direct S3 Event -> Lambda trigger with EventBridge
      # notifications, which the EventBridge Rule below filters and routes to
      # the state machine. Both mechanisms are never configured at once - that
      # would double-transcode every upload.
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-upload-url
      Runtime: nodejs20.x
      Architectures: [arm64]
      CodeUri: src/get-upload-url/
      Handler: index.handler
      Environment:
        Variables:
          BUCKET_NAME: !Ref RawVideoBucket
      # Scoped to the uploads/ prefix only, not the whole bucket - least privilege
      # even though today the bucket only ever holds that prefix.
      Policies:
        - Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${RawVideoBucket}/uploads/*
      FunctionUrlConfig:
        AuthType: NONE # placeholder for Day 1 only - see README security model section before going further
        Cors:
          AllowOrigins: ['*']
          AllowMethods: [GET]
          AllowHeaders: [content-type]

  # Separate from RawVideoBucket on purpose: the transcode Lambda writes here,
  # never back to the bucket that triggered it, which is what rules out a
  # recursive invocation loop by construction (not just by prefix filtering).
  OutputVideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub video-pipeline-output-${AWS::AccountId}
      # Day 4: this bucket is fronted by CloudFront via Origin Access Control
      # (see CloudFrontDistribution + OutputBucketPolicy below) - explicitly
      # blocking all public access makes that the *only* way in, rather than
      # relying on the absence of a public bucket policy to keep it private.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireProcessedAfter7Days
            Status: Enabled
            ExpirationInDays: 7 # same free-tier-friendly retention as the raw bucket, for now

  # Day 3: probe and transcode share one image (src/worker/Dockerfile has both
  # handlers baked in) - each function resource still triggers its own
  # `sam build`/ECR push under the hood, but there's exactly one Dockerfile
  # and one build context to maintain, and the two diverge only in
  # ImageConfig.Command.
  ProbeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probe-video
      PackageType: Image
      Architectures: [x86_64] # matches the static ffmpeg/ffprobe build baked into the shared image
      MemorySize: 512 # ffprobe just reads headers/metadata, doesn't need transcode-grade memory
      Timeout: 60
      EphemeralStorage:
        Size: 1024 # only ever holds the source download, never an output file
      ImageConfig:
        Command: ['probe.handler']
      Policies:
        # Read-only on the raw bucket, scoped to uploads/ - the state machine
        # is now what removes the old circular-dependency constraint (no S3
        # Event trigger left on either function), so this can reference the
        # bucket resource directly instead of its deterministic name.
        - Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub '${RawVideoBucket.Arn}/uploads/*'
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./src/worker
      DockerTag: latest

  TranscodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: transcode-video
      PackageType: Image
      # Static ffmpeg build in the image is amd64 - must match the Lambda's
      # execution architecture, overriding the arm64 Globals default.
      Architectures: [x86_64]
      MemorySize: 3008 # more memory also means more vCPU share, which is what actually speeds up ffmpeg
      Timeout: 900
      EphemeralStorage:
        Size: 2048 # default 512MB /tmp is too small once you're holding both the input and one rendition's output
      ImageConfig:
        Command: ['transcode.handler']
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputVideoBucket
      Policies:
        # Read-only on the raw bucket, scoped to uploads/ - can't delete, list,
        # or touch anything outside that prefix.
        - Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub '${RawVideoBucket.Arn}/uploads/*'
        # Write-only on the output bucket, scoped to processed/ - can't read
        # back its own writes or anyone else's objects.
        - Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${OutputVideoBucket}/processed/*
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./src/worker
      DockerTag: latest

  # Day 4: finalize step, runs once after the whole Map completes. Same
  # image as Probe/Transcode (Command overridden to master.mjs) but needs
  # neither ffmpeg/ffprobe nor much memory - it just formats a string and
  # does one PutObject.
  WriteMasterPlaylistFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: write-master-playlist
      PackageType: Image
      Architectures: [x86_64] # must match the shared image's platform, even though this handler never touches ffmpeg
      MemorySize: 256
      Timeout: 30
      ImageConfig:
        Command: ['master.handler']
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputVideoBucket
      Policies:
        # Write-only on the output bucket, scoped to processed/ - same
        # constraint as TranscodeFunction, for the same reason.
        - Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${OutputVideoBucket}/processed/*
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./src/worker
      DockerTag: latest

  # Single-table job tracker. On-demand billing - free-tier friendly, no
  # capacity planning for a pipeline that runs on-demand per upload.
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: video-pipeline-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH

  # State machine's own role, scoped to exactly what each state needs: invoke
  # the three Lambdas by ARN, read/write only this table. No Lambda-based
  # status writes - MarkJobStarted/MarkTranscoding/MarkCompleted/MarkFailed
  # all use the direct dynamodb:putItem/updateItem SDK integration.
  PipelineStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: video-pipeline-transcode
      Type: STANDARD
      DefinitionUri: statemachine/pipeline.asl.json
      DefinitionSubstitutions:
        JobsTableName: !Ref JobsTable
        ProbeFunctionArn: !GetAtt ProbeFunction.Arn
        TranscodeFunctionArn: !GetAtt TranscodeFunction.Arn
        WriteMasterPlaylistFunctionArn: !GetAtt WriteMasterPlaylistFunction.Arn
        # Baked into MarkCompleted's cloudFrontUrl via States.Format - the
        # domain is deploy-time-known (assigned by CloudFront), never
        # runtime data, so a template substitution is the right layer for
        # it rather than passing it through every state's payload.
        CloudFrontDomainName: !GetAtt CloudFrontDistribution.DomainName
      Policies:
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt ProbeFunction.Arn
                - !GetAtt TranscodeFunction.Arn
                - !GetAtt WriteMasterPlaylistFunction.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource: !GetAtt JobsTable.Arn

  # EventBridge only invokes states:StartExecution on this one state machine -
  # it can't touch the Lambdas, buckets, or table directly.
  EventBridgeStartExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelineExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Ref PipelineStateMachine

  # Fires the state machine on every new upload. Replaces Day 2's direct S3
  # Event -> Lambda trigger (removed above, on TranscodeFunction) so the two
  # paths never run simultaneously and double-transcode an upload.
  UploadCreatedRule:
    Type: AWS::Events::Rule
    Properties:
      Name: video-pipeline-upload-created
      EventPattern:
        source: [aws.s3]
        detail-type: ['Object Created']
        detail:
          bucket:
            name: [!Ref RawVideoBucket]
          object:
            key:
              - prefix: uploads/
      Targets:
        - Id: PipelineStateMachine
          Arn: !Ref PipelineStateMachine
          RoleArn: !GetAtt EventBridgeStartExecutionRole.Arn
          # State machine only needs the S3 event's `detail` (bucket/object) -
          # trims the EventBridge envelope (source, account, region, etc.)
          # before it becomes the execution input.
          InputPath: $.detail

  # Day 4: lets CloudFront read from OutputVideoBucket without the bucket
  # ever granting public/anonymous access. OAC (not the older OAI) is the
  # current AWS-recommended mechanism - it signs every origin request with
  # SigV4 rather than relying on a special CloudFront-only IAM identity.
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub video-pipeline-oac-${AWS::AccountId}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # hls.js on localhost fetches playlists/segments cross-origin - without
  # permissive CORS headers on the CloudFront response, the browser blocks
  # every segment fetch even though the GET itself succeeds at the origin.
  HlsCorsResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub video-pipeline-hls-cors-${AWS::AccountId}
        CorsConfig:
          AccessControlAllowOrigins:
            Items: ['*']
          AccessControlAllowMethods:
            Items: [GET, HEAD]
          AccessControlAllowHeaders:
            Items: ['*']
          AccessControlAllowCredentials: false
          OriginOverride: true

  # Fronts OutputVideoBucket - the bucket itself stays fully private
  # (PublicAccessBlockConfiguration above); this is the only path in.
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100 # cheapest tier (NA/EU edge locations only) - fine for a demo, not a global audience
        Origins:
          - Id: OutputBucketOrigin
            DomainName: !GetAtt OutputVideoBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: '' # empty on purpose - OAC replaces the legacy OAI mechanism this field was built for
        DefaultCacheBehavior:
          TargetOriginId: OutputBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed-CachingOptimized: long default/max TTL, respects any
          # Cache-Control the origin sends. Playlists and segments are
          # immutable once written (VOD, not live) so this is fine for both -
          # see README gotchas for the nuance if this ever becomes a live
          # pipeline where playlists mutate.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref HlsCorsResponseHeadersPolicy

  # Grants cloudfront.amazonaws.com read access, scoped to exactly this
  # distribution via the SourceArn condition - a different distribution
  # (even in the same account) can't use this policy to read the bucket.
  OutputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref OutputVideoBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${OutputVideoBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

Outputs:
  UploadFunctionUrl:
    Description: Public URL for the get-upload-url Lambda
    Value: !GetAtt GetUploadUrlFunctionUrl.FunctionUrl
  RawVideoBucketName:
    Description: Name of the S3 bucket that receives raw uploads
    Value: !Ref RawVideoBucket
  OutputVideoBucketName:
    Description: Name of the S3 bucket that receives transcoded renditions
    Value: !Ref OutputVideoBucket
  JobsTableName:
    Description: Name of the DynamoDB table tracking transcode job status
    Value: !Ref JobsTable
  PipelineStateMachineArn:
    Description: ARN of the Step Functions state machine that orchestrates each transcode job
    Value: !Ref PipelineStateMachine
  CloudFrontDomainName:
    Description: CloudFront distribution domain that serves processed/* (HLS playlists + segments) - inject into frontend/watch.html
    Value: !GetAtt CloudFrontDistribution.DomainName
