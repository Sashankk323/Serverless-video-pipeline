AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Video transcoding pipeline - Day 2: presigned-URL upload path (Day 1) plus a
  direct S3-triggered container-image Lambda that transcodes uploads to 720p
  MP4 with a static ffmpeg build. Step Functions orchestration, HLS output,
  and CloudFront arrive in later days.

Globals:
  Function:
    # Runtime and Architectures are intentionally NOT set here: TranscodeFunction
    # is PackageType Image with an x86_64 image (to match the static ffmpeg
    # build), and SAM's Globals merge for Architectures on Image functions
    # errors out even when the function-level value would otherwise override it.
    # Each function sets both explicitly instead.
    Timeout: 10
    MemorySize: 128

Resources:
  # Dedicated bucket for raw (pre-transcode) uploads only. Keeping it separate
  # from the future HLS output bucket means the two lifecycle/CORS/event
  # policies never fight each other as the pipeline grows.
  RawVideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub video-pipeline-raw-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*'] # tighten to the real frontend origin once it has a fixed domain
            AllowedMethods: [PUT]
            AllowedHeaders: ['*']
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: ExpireUploadsAfter7Days
            Status: Enabled
            ExpirationInDays: 7 # raw uploads are transient inputs, not the product - keep this at $0

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: get-upload-url
      Runtime: nodejs20.x
      Architectures: [arm64]
      CodeUri: src/get-upload-url/
      Handler: index.handler
      Environment:
        Variables:
          BUCKET_NAME: !Ref RawVideoBucket
      # Scoped to the uploads/ prefix only, not the whole bucket - least privilege
      # even though today the bucket only ever holds that prefix.
      Policies:
        - Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${RawVideoBucket}/uploads/*
      FunctionUrlConfig:
        AuthType: NONE # placeholder for Day 1 only - see README security model section before going further
        Cors:
          AllowOrigins: ['*']
          AllowMethods: [GET]
          AllowHeaders: [content-type]

  # Separate from RawVideoBucket on purpose: the transcode Lambda writes here,
  # never back to the bucket that triggered it, which is what rules out a
  # recursive invocation loop by construction (not just by prefix filtering).
  OutputVideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub video-pipeline-output-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: ExpireProcessedAfter7Days
            Status: Enabled
            ExpirationInDays: 7 # same free-tier-friendly retention as the raw bucket, for now

  TranscodeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: transcode-video
      PackageType: Image
      # Static ffmpeg build in the image is amd64 - must match the Lambda's
      # execution architecture, overriding the arm64 Globals default.
      Architectures: [x86_64]
      MemorySize: 3008 # more memory also means more vCPU share, which is what actually speeds up ffmpeg
      Timeout: 900
      EphemeralStorage:
        Size: 2048 # default 512MB /tmp is too small once you're holding both the input and 720p output
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputVideoBucket
      Policies:
        # Read-only on the raw bucket, scoped to uploads/ - can't delete, list,
        # or touch anything outside the prefix it was triggered from.
        # ARN is built from the bucket's deterministic name (not !Ref/!GetAtt on
        # RawVideoBucket) to avoid a circular dependency: the S3 Event below
        # already makes RawVideoBucket depend on this function's permission, so
        # this policy referencing the bucket resource directly would cycle back.
        - Statement:
            - Effect: Allow
              Action: s3:GetObject
              Resource: !Sub arn:aws:s3:::video-pipeline-raw-${AWS::AccountId}/uploads/*
        # Write-only on the output bucket, scoped to processed/ - can't read
        # back its own writes or anyone else's objects.
        - Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub arn:aws:s3:::${OutputVideoBucket}/processed/*
      Events:
        VideoUploaded:
          Type: S3
          Properties:
            Bucket: !Ref RawVideoBucket
            Events: s3:ObjectCreated:*
            # Second guard against recursion (first is the separate output
            # bucket): even a future misconfiguration that pointed this trigger
            # at the wrong bucket couldn't self-loop past this prefix filter.
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ./src/transcode
      DockerTag: latest

Outputs:
  UploadFunctionUrl:
    Description: Public URL for the get-upload-url Lambda
    Value: !GetAtt GetUploadUrlFunctionUrl.FunctionUrl
  RawVideoBucketName:
    Description: Name of the S3 bucket that receives raw uploads
    Value: !Ref RawVideoBucket
  OutputVideoBucketName:
    Description: Name of the S3 bucket that receives transcoded 720p output
    Value: !Ref OutputVideoBucket
